- name: security news
  columns:
    - size: full
      widgets:
        - type: split-column
          max-columns: 3
          widgets:
            - type: rss
              title: "Help Net Security"
              limit: 30
              style: detailed-list
              collapse-after: 5
              cache: 6h
              feeds:
                - url: https://www.helpnetsecurity.com/feed/
                  title: Help Net Security
                  # limit: 5
            - type: rss
              title: "Dark Reading"
              limit: 30
              style: detailed-list
              collapse-after: 5
              cache: 6h
              feeds:
                - url: https://www.darkreading.com/rss.xml
                  title: Dark Reading
                  # limit: 5
            - type: rss
              title: "SANS ISC"
              limit: 30
              style: detailed-list
              collapse-after: 5
              cache: 6h
              feeds:
                - url: https://isc.sans.edu/rssfeed.xml
                  title: SANS ISC
                  # limit: 5
            - type: rss
              title: "Security Week"
              limit: 30
              style: detailed-list
              collapse-after: 5
              cache: 6h
              feeds:
                - url: https://feeds.feedburner.com/securityweek
                  title: Security Week
                  # limit: 5
            - type: rss
              title: "THE Hacker News"
              limit: 30
              style: detailed-list
              collapse-after: 5
              cache: 6h
              feeds:
                - url: https://feeds.feedburner.com/TheHackersNews
                  title: THE Hacker News
                  # limit: 5

            - type: rss
              title: "The Register"
              limit: 30
              style: detailed-list
              collapse-after: 5
              cache: 6h
              feeds:
                - url: https://www.theregister.com/headlines.atom
                  title: The Register
                  # limit: 5


